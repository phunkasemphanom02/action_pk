name: Daily PK Cargo Scrape

on:
  workflow_dispatch:      # กดรันเองได้จากหน้า GitHub หรือสั่งผ่าน API (cron-job.org)

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Google Drive Credentials
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN_JSON }}
        run: |
          echo "$GDRIVE_CREDENTIALS" > credentials.json
          echo "$GDRIVE_TOKEN" > token.json

      - name: Run Scraper
        env:
          PK_EMAIL: ${{ secrets.PK_EMAIL }}
          PK_PASSWORD: ${{ secrets.PK_PASSWORD }}
          GOOGLE_SCRIPT_URL: ${{ secrets.GOOGLE_SCRIPT_URL }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_TOKEN_JSON: ${{ secrets.GDRIVE_TOKEN_JSON }}
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          PK_START_PAGE: 1
          PK_MAX_PAGES: 1
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "hotmailoo1000-bot"
          git config --global user.email "hotmailo1000@gmail.com"
          git add pkcargo_data.json
          git commit -m "Auto Update Data: $(date)" || echo "No changes to commit"
          git push
