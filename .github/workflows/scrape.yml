name: PK Cargo Scrape

on:
  schedule:
    - cron: '13 0 * * *'   # ดึง 10 หน้า ทุกวันเวลาประมาณ 07:13 น. (เวลาไทย)
    - cron: '17,47 * * * *' # ดึงหน้าแรกทุก 30 นาที โดยหลบช่วงต้นชั่วโมง
  workflow_dispatch:      # กดรันเองได้จากหน้า GitHub หรือสั่งผ่าน API

concurrency:
  group: pk-cargo-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Google Drive Credentials
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN_JSON }}
        run: |
          echo "$GDRIVE_CREDENTIALS" > credentials.json
          echo "$GDRIVE_TOKEN" > token.json

      - name: Run Scraper
        env:
          PK_EMAIL: ${{ secrets.PK_EMAIL }}
          PK_PASSWORD: ${{ secrets.PK_PASSWORD }}
          GOOGLE_SCRIPT_URL: ${{ secrets.GOOGLE_SCRIPT_URL }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_TOKEN_JSON: ${{ secrets.GDRIVE_TOKEN_JSON }}
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          PK_START_PAGE: 1
          # รอบรายวันและการกดรันเองดึง 10 หน้า; รอบ 17/47 ดึงเฉพาะหน้าแรก
          PK_MAX_PAGES: ${{ (github.event_name == 'workflow_dispatch' || github.event.schedule == '13 0 * * *') && '10' || '1' }}
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "hotmailoo1000-bot"
          git config --global user.email "hotmailo1000@gmail.com"
          git add pkcargo_data.json
          git commit -m "Auto Update Data: $(date)" || echo "No changes to commit"
          git push
